name: Build and Test ASP.NET Core Application

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        working-directory: code
        run: dotnet restore

      - name: Build
        working-directory: code
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        working-directory: code
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: code/**/TestResults/**/*.trx
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Coverage Report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: code/**/TestResults/**/coverage.cobertura.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: $GITHUB_REPOSITORY" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Folder**: code" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: completed" >> $GITHUB_STEP_SUMMARY